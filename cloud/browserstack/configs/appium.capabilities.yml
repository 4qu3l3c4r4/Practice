# BrowserStack capabilities for Appium (mobile)
# Copy into your Appium test config

common:
  bstack:options:
    userName: ${BROWSERSTACK_USERNAME}
    accessKey: ${BROWSERSTACK_ACCESS_KEY}
    projectName: ${BROWSERSTACK_PROJECT}
    buildName: ${BROWSERSTACK_BUILD}
    debug: true
    networkLogs: true

# Upload your app first:
#   curl -u "$BROWSERSTACK_USERNAME:$BROWSERSTACK_ACCESS_KEY" \
#     -X POST https://api-cloud.browserstack.com/app-automate/upload \
#     -F "file=@/path/to/app.apk"
# Use the returned app_url below.

android:
  platformName: android
  bstack:options:
    deviceName: Samsung Galaxy S24
    osVersion: "14.0"
    appUrl: bs://<app_hash_from_upload>

ios:
  platformName: ios
  bstack:options:
    deviceName: iPhone 15
    osVersion: "17"
    appUrl: bs://<app_hash_from_upload>
