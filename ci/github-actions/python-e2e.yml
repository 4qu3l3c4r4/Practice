# GitHub Actions — Python (Selenium / Appium / pytest-requests / Robot Framework)
name: E2E Tests (Python)
on:
  push:
    branches: [main, develop]
  pull_request:

env:
  BASE_URL: ${{ secrets.BASE_URL }}
  UI_USERNAME: ${{ secrets.UI_USERNAME }}
  UI_PASSWORD: ${{ secrets.UI_PASSWORD }}

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - run: pip install -r requirements.txt

      # Playwright-Python only
      - run: playwright install --with-deps chromium
        if: hashFiles('conftest.py') != '' && contains(hashFiles('requirements.txt'), 'playwright')

      # Selenium only — install Chrome
      - uses: browser-actions/setup-chrome@v1
        if: contains(hashFiles('requirements.txt'), 'selenium')

      - run: pytest --junitxml=reports/results.xml

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            reports/
            screenshots/
          retention-days: 14
