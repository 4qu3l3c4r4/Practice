# GitHub Actions — k6 / Artillery load tests
name: Load Tests
on:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Target URL'
        required: true
        default: 'https://staging.example.com'

jobs:
  k6:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: grafana/setup-k6-action@v1
      - run: k6 run -e BASE_URL=${{ inputs.target_url }} load-test.js
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-results
          path: results.*

