# GitHub Actions — .NET (Playwright C# / Selenium C# / Appium C#)
name: E2E Tests (.NET)
on:
  push:
    branches: [main, develop]
  pull_request:

env:
  BASE_URL: ${{ secrets.BASE_URL }}
  UI_USERNAME: ${{ secrets.UI_USERNAME }}
  UI_PASSWORD: ${{ secrets.UI_PASSWORD }}

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - run: dotnet restore

      # Playwright .NET only
      - run: pwsh bin/Debug/net8.0/playwright.ps1 install --with-deps chromium
        if: hashFiles('*.csproj') != '' && contains(hashFiles('*.csproj'), 'Microsoft.Playwright')
        continue-on-error: true

      - run: dotnet test --logger "trx;LogFileName=results.trx"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            TestResults/
            screenshots/
          retention-days: 14
