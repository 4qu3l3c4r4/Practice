name: E2E Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Install Playwright browsers
      run: npx playwright install chromium
    
    - name: Generate BDD bindings
      run: npm run bddgen
    
    - name: Run E2E tests
      run: npm test
      env:
        CI: true
        BASE_URL: ${{ secrets.BASE_URL }}
        UI_USERNAME: ${{ secrets.UI_USERNAME }}
        UI_PASSWORD: ${{ secrets.UI_PASSWORD }}
    
    - name: Upload test reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-reports
        path: |
          reports/
          test-results/
        retention-days: 7
    
    - name: Upload screenshots
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: screenshots
        path: screenshots/
        retention-days: 7