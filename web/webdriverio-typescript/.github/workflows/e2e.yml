name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - run: npm ci
      - run: npm test
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          UI_USERNAME: ${{ secrets.UI_USERNAME }}
          UI_PASSWORD: ${{ secrets.UI_PASSWORD }}